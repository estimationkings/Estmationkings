<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening Estimation Kings...</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background-color: #0B0E14;
      color: white;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 4px solid #fff;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .container { text-align: center; }
  </style>
  <script>
  // استخراج الـ roomId سواء من المسار أو من الـ URL Parameters
  const urlParams = new URLSearchParams(window.location.search);
  let roomId = urlParams.get('match');
  
  if (!roomId) {
    const pathParts = window.location.pathname.split('/');
    roomId = pathParts[pathParts.length - 1];
  }

  // التأكد من وجود roomId قبل التحويل
  if (roomId && roomId !== "") {
    const DEEP_LINK = `estimationgame://join/${roomId}`;
    const FALLBACK_URL = "https://play.google.com/store/apps/details?id=com.estimationgame.app";

    window.location.href = DEEP_LINK;

    setTimeout(() => {
      window.location.href = FALLBACK_URL;
    }, 1000); // زدنا الوقت لـ 1000ms لضمان عمل التحويل
  } else {
    // لو مفيش roomId، يروح للمتجر مباشرة
    window.location.href = "https://play.google.com/store/apps/details?id=com.estimationgame.app";
  }
</script>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>جاري فتح اللعبة...</p>
    <p style="font-size: 12px; opacity: 0.7;">إذا لم يتم فتح التطبيق تلقائياً، تأكد من تثبيت اللعبة</p>
  </div>
</body>
</html>
